<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Chess RL Arena</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Roboto+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #161512;
            --panel: #1d1b18;
            --panel2: #27251f;
            --border: #3d3a35;
            --text: #c8c5be;
            --muted: #6b6760;
            --accent: #b58863;
            --accent2: #88a070;
            --danger: #c04040;
            --sq-l: #f0d9b5;
            --sq-d: #b58863;
            --hi-sel: #f6f669;
            --hi-last: rgba(155, 199, 0, .38);
            --hi-dest: rgba(20, 85, 30, .52);
            --hi-cap: rgba(20, 85, 30, .52);
            --check: radial-gradient(circle, rgba(220, 40, 40, .88) 0%, transparent 68%);
            --sz: min(500px, 90vmin);
            --sf-blue: #4a7cc7;
            --sf-blue-dim: #1a2d4a;
            --model-green: #4a9c6a;
            --model-green-dim: #1a3228;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column
        }

        /* ── Header ── */
        header {
            display: flex;
            align-items: center;
            gap: .8rem;
            padding: .5rem 1.1rem;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0
        }

        header h1 {
            font-size: .95rem;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: .04em;
            white-space: nowrap
        }

        #mode-badge {
            font-size: .62rem;
            font-weight: 500;
            padding: .15rem .55rem;
            border-radius: 10rem;
            background: var(--panel2);
            border: 1px solid var(--border);
            color: var(--muted);
            white-space: nowrap;
            letter-spacing: .04em;
            text-transform: uppercase;
        }

        #mode-badge.hvs {
            background: var(--sf-blue-dim);
            border-color: var(--sf-blue);
            color: var(--sf-blue)
        }

        #mode-badge.mvs {
            background: var(--model-green-dim);
            border-color: var(--model-green);
            color: var(--model-green)
        }

        #mode-badge.hvm {
            background: #22201a;
            border-color: var(--accent);
            color: var(--accent)
        }

        #depth-badge {
            font-size: .62rem;
            font-weight: 500;
            padding: .15rem .5rem;
            border-radius: 3px;
            background: var(--panel2);
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: 'Roboto Mono', monospace;
        }

        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: .5rem
        }

        #status-pill {
            font-size: .7rem;
            font-weight: 500;
            padding: .2rem .65rem;
            border-radius: 10rem;
            background: var(--panel2);
            border: 1px solid var(--border);
            color: var(--muted);
            transition: all .2s;
            white-space: nowrap;
        }

        #status-pill.your-turn {
            background: #1a2d1a;
            border-color: #2d4d2d;
            color: #6dcc6d
        }

        #status-pill.opp-turn {
            background: #1a1e2d;
            border-color: #2d3550;
            color: #6d8ddd
        }

        #status-pill.check {
            background: #2d1a1a;
            border-color: #4d2020;
            color: #dd6d6d
        }

        #status-pill.game-over {
            background: #2a2615;
            border-color: #4a4220;
            color: var(--accent)
        }

        #status-pill.autoplay {
            background: var(--model-green-dim);
            border-color: var(--model-green);
            color: var(--model-green)
        }

        /* ── Main layout ── */
        main {
            flex: 1;
            display: flex;
            gap: 0;
            overflow: hidden
        }

        /* ── Board area ── */
        .board-area {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: .8rem;
            gap: .3rem
        }

        .player-strip {
            width: var(--sz);
            display: flex;
            align-items: center;
            gap: .5rem;
            padding: .25rem .4rem;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 5px;
            transition: border-color .2s
        }

        .player-strip.active {
            border-color: var(--accent2)
        }

        .player-strip.sf-active {
            border-color: var(--sf-blue)
        }

        .player-strip.model-active {
            border-color: var(--model-green)
        }

        .avatar {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .8rem;
            background: var(--panel2);
            flex-shrink: 0
        }

        .pname {
            font-size: .76rem;
            font-weight: 500;
            flex: 1;
            color: var(--text)
        }

        .depth-tag {
            font-size: .6rem;
            color: var(--sf-blue);
            font-family: 'Roboto Mono', monospace;
            margin-left: .3rem;
            opacity: .8
        }

        .cap-pieces {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1px;
            font-size: .8rem
        }

        .mat-adv {
            font-size: .62rem;
            font-weight: 600;
            color: var(--accent2);
            margin-left: .2rem
        }

        /* ── Board wrap ── */
        .board-wrap {
            position: relative;
            width: var(--sz);
            height: var(--sz);
            flex-shrink: 0;
            border: 2px solid #0a0a08;
            border-radius: 2px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, .7);
            user-select: none;
            -webkit-user-select: none;
            touch-action: none
        }

        #board {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr)
        }

        /* ── Squares ── */
        .sq {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: default
        }

        .sq.light {
            background: var(--sq-l)
        }

        .sq.dark {
            background: var(--sq-d)
        }

        .sq.hi-last {
            background: var(--hi-last) !important
        }

        .sq.hi-sel::after {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--hi-sel);
            opacity: .72;
            pointer-events: none
        }

        .sq.hi-dest-e::after {
            content: '';
            position: absolute;
            width: 32%;
            height: 32%;
            border-radius: 50%;
            background: var(--hi-dest);
            pointer-events: none;
            z-index: 2
        }

        .sq.hi-dest-c::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            box-shadow: inset 0 0 0 5px var(--hi-cap);
            pointer-events: none;
            z-index: 2
        }

        .sq.in-check::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--check);
            pointer-events: none;
            z-index: 1
        }

        .sq.can-grab {
            cursor: grab
        }

        .sq.can-grab:active {
            cursor: grabbing
        }

        .coord {
            position: absolute;
            font-size: clamp(7px, 1.3vmin, 9px);
            font-weight: 600;
            font-family: 'Roboto Mono', monospace;
            pointer-events: none;
            z-index: 4;
            line-height: 1
        }

        .coord-r {
            top: 2px;
            left: 3px
        }

        .coord-f {
            bottom: 2px;
            right: 3px
        }

        .sq.light .coord {
            color: var(--sq-d)
        }

        .sq.dark .coord {
            color: var(--sq-l)
        }

        .piece {
            position: absolute;
            inset: 0;
            background-size: 85%;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none;
            z-index: 3;
            will-change: transform
        }

        .piece.ghost-hidden {
            opacity: 0
        }

        #ghost {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transform: translate(-50%, -50%);
            display: none;
            filter: drop-shadow(0 4px 16px rgba(0, 0, 0, .8));
            width: calc(var(--sz)/8 * 1.2);
            height: calc(var(--sz)/8 * 1.2)
        }

        #promo {
            display: none;
            position: absolute;
            z-index: 200;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .9);
            flex-direction: column;
            overflow: hidden
        }

        #promo.show {
            display: flex
        }

        .promo-sq {
            width: calc(var(--sz)/8);
            height: calc(var(--sz)/8);
            background-size: 82%;
            background-repeat: no-repeat;
            background-position: center;
            cursor: pointer;
            transition: background .12s
        }

        .promo-sq:hover {
            background-color: var(--panel2)
        }

        /* ── Right panel ── */
        .panel {
            flex: 1;
            min-width: 220px;
            max-width: 290px;
            display: flex;
            flex-direction: column;
            gap: 0;
            border-left: 1px solid var(--border);
            overflow: hidden
        }

        .panel-section {
            padding: .65rem .85rem;
            border-bottom: 1px solid var(--border)
        }

        .panel-label {
            font-size: .58rem;
            text-transform: uppercase;
            letter-spacing: .12em;
            color: var(--muted);
            margin-bottom: .4rem
        }

        /* ── Buttons ── */
        .ctrl-row {
            display: flex;
            gap: .35rem;
            flex-wrap: wrap
        }

        .btn {
            padding: .3rem .55rem;
            border-radius: 3px;
            border: 1px solid var(--border);
            background: var(--panel2);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: .7rem;
            cursor: pointer;
            transition: all .12s;
            flex: 1;
            white-space: nowrap;
            text-align: center
        }

        .btn:hover {
            background: var(--border);
            border-color: #555
        }

        .btn:disabled {
            opacity: .4;
            cursor: default
        }

        .btn.new {
            background: #1e2f1a;
            border-color: #2e4a28;
            color: var(--accent2)
        }

        .btn.new:hover {
            background: #253a20
        }

        .btn.danger {
            background: #2a1515;
            border-color: #4a2020;
            color: var(--danger)
        }

        .btn.danger:hover {
            background: #341818
        }

        .btn.primary {
            background: var(--sf-blue-dim);
            border-color: var(--sf-blue);
            color: var(--sf-blue)
        }

        .btn.primary:hover {
            background: #1e3560
        }

        .btn.stop {
            background: #2d1f1a;
            border-color: #5a3020;
            color: #cc7a44
        }

        .btn.stop:hover {
            background: #381e12
        }

        /* ── Side selector ── */
        .side-row {
            display: flex;
            gap: .35rem;
            margin-bottom: .45rem
        }

        .side-btn {
            flex: 1;
            padding: .28rem;
            border-radius: 3px;
            border: 1px solid var(--border);
            background: var(--panel2);
            color: var(--muted);
            font-size: .95rem;
            cursor: pointer;
            text-align: center;
            transition: all .12s
        }

        .side-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: #221e10
        }

        /* ── Depth selector ── */
        .depth-sel-row {
            display: flex;
            align-items: center;
            gap: .5rem;
            margin-top: .3rem
        }

        .depth-sel-row label {
            font-size: .63rem;
            color: var(--muted);
            white-space: nowrap
        }

        .depth-input {
            width: 52px;
            background: var(--panel2);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Roboto Mono', monospace;
            font-size: .72rem;
            padding: .2rem .35rem;
            border-radius: 3px;
            text-align: center
        }

        .depth-input:focus {
            outline: none;
            border-color: var(--sf-blue)
        }

        .depth-range {
            flex: 1;
            accent-color: var(--sf-blue);
            height: 3px;
            cursor: pointer
        }

        /* ── Temperature ── */
        .temp-row {
            display: flex;
            align-items: center;
            gap: .5rem;
            margin-top: .35rem
        }

        .temp-row label {
            font-size: .63rem;
            color: var(--muted);
            white-space: nowrap
        }

        input[type=range] {
            flex: 1;
            accent-color: var(--accent);
            height: 3px;
            cursor: pointer
        }

        #temp-val {
            font-size: .63rem;
            color: var(--accent);
            min-width: 2.4rem;
            text-align: right;
            font-family: 'Roboto Mono', monospace
        }

        /* ── Autoplay speed ── */
        .speed-row {
            display: flex;
            align-items: center;
            gap: .5rem;
            margin-top: .35rem
        }

        .speed-row label {
            font-size: .63rem;
            color: var(--muted);
            white-space: nowrap
        }

        #delay-val {
            font-size: .63rem;
            color: var(--model-green);
            min-width: 2.8rem;
            text-align: right;
            font-family: 'Roboto Mono', monospace
        }

        /* ── Stats (model-vs-stockfish) ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: .3rem;
            margin-top: .3rem
        }

        .stat-box {
            background: var(--panel2);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: .3rem .4rem;
            text-align: center
        }

        .stat-val {
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Roboto Mono', monospace;
            line-height: 1.1
        }

        .stat-lbl {
            font-size: .55rem;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--muted);
            margin-top: .1rem
        }

        .stat-box.wins .stat-val {
            color: var(--accent2)
        }

        .stat-box.losses .stat-val {
            color: var(--danger)
        }

        .stat-box.draws .stat-val {
            color: var(--accent)
        }

        /* ── Move probs ── */
        .prob-row {
            display: flex;
            align-items: center;
            gap: .35rem;
            margin: 1px 0
        }

        .prob-san {
            font-size: .68rem;
            color: var(--text);
            min-width: 3.2rem;
            font-family: 'Roboto Mono', monospace
        }

        .prob-bg {
            flex: 1;
            height: 4px;
            background: var(--panel2);
            border-radius: 2px;
            overflow: hidden
        }

        .prob-fill {
            height: 100%;
            border-radius: 2px;
            transition: width .22s ease
        }

        .prob-fill.top {
            background: var(--accent2)
        }

        .prob-fill.rest {
            background: #4a6a8a
        }

        .prob-pct {
            font-size: .6rem;
            color: var(--muted);
            min-width: 2.6rem;
            text-align: right;
            font-family: 'Roboto Mono', monospace
        }

        /* ── Move list ── */
        .moves-scroll {
            flex: 1;
            overflow-y: auto;
            padding: .45rem .85rem
        }

        .move-pair {
            display: flex;
            align-items: center;
            width: 100%;
            margin: 1px 0
        }

        .mn {
            font-size: .63rem;
            color: var(--muted);
            min-width: 1.8rem;
            font-family: 'Roboto Mono', monospace
        }

        .ms {
            padding: .07rem .28rem;
            border-radius: 2px;
            font-size: .7rem;
            color: var(--text);
            min-width: 3.5rem;
            font-family: 'Roboto Mono', monospace;
            transition: background .1s
        }

        .ms:hover {
            background: var(--panel2)
        }

        .ms.cur {
            background: var(--panel2);
            color: var(--accent2);
            font-weight: 500
        }

        /* ── Result banner ── */
        #result-banner {
            display: none;
            margin: .45rem .85rem;
            padding: .45rem .65rem;
            border-radius: 4px;
            text-align: center;
            font-size: .8rem;
            font-weight: 600
        }

        #result-banner.win {
            background: #1a2e1a;
            color: var(--accent2);
            border: 1px solid #2d5030
        }

        #result-banner.lose {
            background: #2e1a1a;
            color: var(--danger);
            border: 1px solid #502020
        }

        #result-banner.draw {
            background: #23201a;
            color: var(--accent);
            border: 1px solid #4a4020
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar {
            width: 3px
        }

        ::-webkit-scrollbar-track {
            background: var(--panel)
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px
        }

        /* ── Hidden util ── */
        .hidden {
            display: none !important
        }
    </style>
</head>

<body>

    <header>
        <h1>♟ Chess RL Arena</h1>
        <span id="mode-badge">—</span>
        <span id="depth-badge" class="hidden">SF d—</span>
        <div class="header-right">
            <span id="status-pill">connecting…</span>
        </div>
    </header>

    <main>

        <!-- Board column -->
        <div class="board-area">
            <div class="player-strip" id="strip-top">
                <div class="avatar" id="av-top">🤖</div>
                <div class="pname" id="nm-top">Opponent</div>
                <div class="cap-pieces" id="cap-top"></div>
            </div>
            <div class="board-wrap">
                <div id="board"></div>
                <div id="ghost"></div>
                <div id="promo"></div>
            </div>
            <div class="player-strip" id="strip-bot">
                <div class="avatar" id="av-bot">🧑</div>
                <div class="pname" id="nm-bot">You</div>
                <div class="cap-pieces" id="cap-bot"></div>
            </div>
        </div>

        <!-- Right panel -->
        <div class="panel">

            <!-- Game controls -->
            <div class="panel-section">
                <div class="panel-label">Game</div>

                <!-- Side selector (hidden in model-vs-stockfish) -->
                <div class="side-row" id="side-row">
                    <div class="side-btn active" id="sb-w" onclick="setSide('white')" title="Play White">♔</div>
                    <div class="side-btn" id="sb-b" onclick="setSide('black')" title="Play Black">♚</div>
                </div>

                <!-- Model colour (model-vs-stockfish only) -->
                <div class="side-row hidden" id="model-side-row">
                    <div class="side-btn active" id="msb-w" onclick="setModelSide('white')" title="Model plays White">♔
                        Model</div>
                    <div class="side-btn" id="msb-b" onclick="setModelSide('black')" title="Model plays Black">♚ Model
                    </div>
                </div>

                <div class="ctrl-row" id="ctrl-human">
                    <button class="btn new" onclick="newGame()">▶ New</button>
                    <button class="btn" onclick="undoMove()">↩ Undo</button>
                    <button class="btn danger" onclick="resign()">🏳 Resign</button>
                </div>

                <!-- Autoplay controls (model-vs-stockfish) -->
                <div class="ctrl-row hidden" id="ctrl-auto">
                    <button class="btn new primary" id="btn-play" onclick="startAutoplay()">▶ Play Game</button>
                    <button class="btn stop" id="btn-stop" onclick="stopAutoplay()" disabled>■ Stop</button>
                </div>
            </div>

            <!-- Depth selector (shown in stockfish modes) -->
            <div class="panel-section" id="depth-section" style="display:none">
                <div class="panel-label">Stockfish Depth</div>
                <div class="depth-sel-row">
                    <label>Depth</label>
                    <input type="range" class="depth-range" id="depth-range" min="1" max="15" value="5"
                        oninput="syncDepth(this.value)">
                    <input type="number" class="depth-input" id="depth-num" min="1" max="20" value="5"
                        oninput="syncDepth(this.value)">
                </div>
                <div style="font-size:.58rem;color:var(--muted);margin-top:.25rem">
                    1–3 beginner &nbsp;·&nbsp; 5 club &nbsp;·&nbsp; 8 strong &nbsp;·&nbsp; 12+ expert
                </div>
            </div>

            <!-- Temperature (hidden in human-vs-stockfish) -->
            <div class="panel-section" id="temp-section">
                <div class="panel-label">Model strength</div>
                <div class="temp-row">
                    <label>Temperature</label>
                    <input type="range" id="temp" min="0.01" max="2" step="0.01" value="0.1"
                        oninput="document.getElementById('temp-val').textContent=parseFloat(this.value).toFixed(2)">
                    <span id="temp-val">0.10</span>
                </div>
                <div style="font-size:.58rem;color:var(--muted);margin-top:.2rem">0.01 strongest · 2.0 random</div>
            </div>

            <!-- Autoplay speed (model-vs-stockfish only) -->
            <div class="panel-section hidden" id="speed-section">
                <div class="panel-label">Playback speed</div>
                <div class="speed-row">
                    <label>Delay</label>
                    <input type="range" id="delay-range" min="0.1" max="3" step="0.1" value="0.8"
                        style="flex:1;accent-color:var(--model-green);height:3px;cursor:pointer"
                        oninput="document.getElementById('delay-val').textContent=parseFloat(this.value).toFixed(1)+'s'">
                    <span id="delay-val">0.8s</span>
                </div>
            </div>

            <!-- Session stats (model-vs-stockfish only) -->
            <div class="panel-section hidden" id="stats-section">
                <div class="panel-label">Session stats</div>
                <div class="stats-grid">
                    <div class="stat-box wins">
                        <div class="stat-val" id="st-wins">0</div>
                        <div class="stat-lbl">Wins</div>
                    </div>
                    <div class="stat-box losses">
                        <div class="stat-val" id="st-losses">0</div>
                        <div class="stat-lbl">Losses</div>
                    </div>
                    <div class="stat-box draws">
                        <div class="stat-val" id="st-draws">0</div>
                        <div class="stat-lbl">Draws</div>
                    </div>
                </div>
            </div>

            <!-- Model thinking / move probs -->
            <div class="panel-section" id="probs-section">
                <div class="panel-label" id="probs-label">Thinking</div>
                <div id="probs"></div>
            </div>

            <div id="result-banner"></div>
            <div class="panel-label" style="padding:.45rem .85rem .1rem">Moves</div>
            <div class="moves-scroll" id="movelist"></div>

        </div>

    </main>

    <script>
        // ═══════════════════════════════════════════════════════
        // Config
        // ═══════════════════════════════════════════════════════
        const API = 'http://127.0.0.1:5000';
        const PIECE_BASE = 'https://cdn.jsdelivr.net/npm/chess-pieces@1.0.0/assets';

        const GLYPH = {
            wP: '♙', wN: '♘', wB: '♗', wR: '♖', wQ: '♕', wK: '♔',
            bP: '♟', bN: '♞', bB: '♝', bR: '♜', bQ: '♛', bK: '♚',
        };

        function makePieceBg(code) {
            const sym = GLYPH[code] || ''; const wh = code[0] === 'w';
            const fill = wh ? '%23fff' : '%231a1a1a'; const strk = wh ? '%23333' : '%23c8a870'; const sw = wh ? 1.5 : 0;
            const svg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 45 45'>`
                + `<text x='22.5' y='36' text-anchor='middle' font-family='serif' font-size='37'`
                + ` fill='${fill}' stroke='${strk}' stroke-width='${sw}' paint-order='stroke'>${sym}</text>`
                + `</svg>`;
            return `url("data:image/svg+xml,${svg.replace(/#/g, '%23').replace(/'/g, '%27')}")`;
        }

        // ═══════════════════════════════════════════════════════
        // FEN parser
        // ═══════════════════════════════════════════════════════
        function parseFen(fen) {
            const parts = fen.split(' '); const board = {}; const pmap = { K: 'wK', Q: 'wQ', R: 'wR', B: 'wB', N: 'wN', P: 'wP', k: 'bK', q: 'bQ', r: 'bR', b: 'bB', n: 'bN', p: 'bP' };
            parts[0].split('/').forEach((rank, ri) => {
                let fi = 0;
                for (const ch of rank) { if (/\d/.test(ch)) fi += +ch; else { board[String.fromCharCode(97 + fi) + (8 - ri)] = pmap[ch]; fi++; } }
            });
            return { board, turn: parts[1] };
        }

        // ═══════════════════════════════════════════════════════
        // State
        // ═══════════════════════════════════════════════════════
        const START = 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1';
        let fen = START, humanSide = 'white', selSq = null, dests = [], lastFrom = '', lastTo = '';
        let gameOver = false, moves = [], fenStack = [START], dragging = null, inFlight = false;
        let sessionInfo = { mode: 'human-vs-model', opponent: '…', sf_depth: 5 };
        let modelSide = 'white';  // for model-vs-sf mode
        let pollInterval = null;

        // ═══════════════════════════════════════════════════════
        // Mode helpers
        // ═══════════════════════════════════════════════════════
        const mode = () => sessionInfo.mode;
        const isHvSF = () => mode() === 'human-vs-stockfish';
        const isMvSF = () => mode() === 'model-vs-stockfish';
        const isHvM = () => mode() === 'human-vs-model';

        function applyModeUI() {
            const m = mode();
            // Mode badge
            const badge = document.getElementById('mode-badge');
            if (isHvSF()) { badge.textContent = 'You vs Stockfish'; badge.className = 'hvs'; }
            else if (isMvSF()) { badge.textContent = 'Model vs Stockfish'; badge.className = 'mvs'; }
            else { badge.textContent = 'You vs Model'; badge.className = 'hvm'; }

            // Depth badge
            const db = document.getElementById('depth-badge');
            if (isHvSF() || isMvSF()) { db.textContent = `SF d${sessionInfo.sf_depth}`; db.classList.remove('hidden'); }
            else { db.classList.add('hidden'); }

            // Side selector
            document.getElementById('side-row').classList.toggle('hidden', isMvSF());
            document.getElementById('model-side-row').classList.toggle('hidden', !isMvSF());

            // Controls
            document.getElementById('ctrl-human').classList.toggle('hidden', isMvSF());
            document.getElementById('ctrl-auto').classList.toggle('hidden', !isMvSF());

            // Sections
            document.getElementById('depth-section').style.display = (isHvSF() || isMvSF()) ? '' : 'none';
            document.getElementById('temp-section').classList.toggle('hidden', isHvSF());
            document.getElementById('speed-section').classList.toggle('hidden', !isMvSF());
            document.getElementById('stats-section').classList.toggle('hidden', !isMvSF());
            document.getElementById('probs-section').classList.toggle('hidden', isHvSF() && false); // always show

            // Probs label
            document.getElementById('probs-label').textContent = isMvSF() ? 'Model thinking' : (isHvSF() ? '' : 'Model thinking');

            // Names
            updateNames();

            // Depth controls
            const d = sessionInfo.sf_depth;
            document.getElementById('depth-range').value = d;
            document.getElementById('depth-num').value = d;
        }

        // ═══════════════════════════════════════════════════════
        // Board rendering
        // ═══════════════════════════════════════════════════════
        const ghost = document.getElementById('ghost');
        const promoEl = document.getElementById('promo');

        function render() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            const st = parseFen(fen);
            const flipped = (isMvSF() && modelSide === 'black') || (isHvM() && humanSide === 'black') || (isHvSF() && humanSide === 'black');
            const hc = isHvSF() || isHvM() ? humanSide[0] : null;  // null in model-vs-sf
            const hTurn = hc && !gameOver && st.turn === hc;
            const ranks = flipped ? [1, 2, 3, 4, 5, 6, 7, 8] : [8, 7, 6, 5, 4, 3, 2, 1];
            const files = flipped ? ['h', 'g', 'f', 'e', 'd', 'c', 'b', 'a'] : ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h'];

            for (let r = 0; r < 8; r++) {
                for (let f = 0; f < 8; f++) {
                    const sq = files[f] + ranks[r]; const pc = st.board[sq];
                    const light = (files.indexOf(files[f]) + ranks[r]) % 2 === 1;
                    const own = pc && hc && pc[0] === hc;
                    const isLast = sq === lastFrom || sq === lastTo;
                    const isSel = sq === selSq; const isDest = dests.includes(sq); const isCap = isDest && !!pc;

                    const div = document.createElement('div');
                    div.className = ['sq', light ? 'light' : 'dark', isLast && !isSel ? 'hi-last' : '', isSel ? 'hi-sel' : '', isDest && !isCap ? 'hi-dest-e' : '', isCap ? 'hi-dest-c' : '', hTurn && own ? 'can-grab' : ''].filter(Boolean).join(' ');
                    div.dataset.sq = sq;

                    if (f === 0) { const s = document.createElement('span'); s.className = 'coord coord-r'; s.textContent = ranks[r]; div.appendChild(s); }
                    if (r === 7) { const s = document.createElement('span'); s.className = 'coord coord-f'; s.textContent = files[f]; div.appendChild(s); }
                    if (pc && !(dragging && dragging.sq === sq)) { const p = document.createElement('div'); p.className = 'piece'; p.style.backgroundImage = makePieceBg(pc); div.appendChild(p); }

                    div.addEventListener('mousedown', e => onDown(e, sq, pc, hTurn, own));
                    div.addEventListener('click', e => onClick(e, sq, pc, hTurn, own));
                    board.appendChild(div);
                }
            }
            updateStrips(st);
            updatePill();
        }

        // ═══════════════════════════════════════════════════════
        // Drag
        // ═══════════════════════════════════════════════════════
        function getSquareAtPoint(x, y) { return document.elementFromPoint(x, y)?.closest('.sq')?.dataset?.sq || null; }
        function posGhost(x, y) { ghost.style.left = x + 'px'; ghost.style.top = y + 'px'; }
        function onDown(e, sq, pc, hTurn, own) { if (!hTurn || !own || e.button !== 0) return; e.preventDefault(); dragging = { sq, pc }; ghost.style.backgroundImage = makePieceBg(pc); ghost.style.display = 'block'; posGhost(e.clientX, e.clientY); selectSq(sq).then(() => render()); document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp); }
        function onMove(e) { if (!dragging) return; posGhost(e.clientX, e.clientY); }
        function onUp(e) { if (!dragging) return; document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); ghost.style.display = 'none'; const from = dragging.sq; dragging = null; const toSq = getSquareAtPoint(e.clientX, e.clientY); render(); if (toSq && toSq !== from && dests.includes(toSq)) tryMove(from, toSq); }

        document.addEventListener('touchstart', e => { const el = e.touches[0]; const sq = getSquareAtPoint(el.clientX, el.clientY); if (!sq) return; const st = parseFen(fen); const hc = humanSide[0]; const hTurn = !gameOver && st.turn === hc; const pc = st.board[sq]; const own = pc && pc[0] === hc; if (hTurn && own) { e.preventDefault(); dragging = { sq, pc }; ghost.style.backgroundImage = makePieceBg(pc); ghost.style.display = 'block'; posGhost(el.clientX, el.clientY); selectSq(sq).then(() => render()); } }, { passive: false });
        document.addEventListener('touchmove', e => { if (!dragging) return; e.preventDefault(); posGhost(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
        document.addEventListener('touchend', e => { if (!dragging) return; ghost.style.display = 'none'; const from = dragging.sq; dragging = null; const t = e.changedTouches[0]; const toSq = getSquareAtPoint(t.clientX, t.clientY); render(); if (toSq && toSq !== from && dests.includes(toSq)) tryMove(from, toSq); });

        // ═══════════════════════════════════════════════════════
        // Click-to-move
        // ═══════════════════════════════════════════════════════
        function onClick(e, sq, pc, hTurn, own) {
            if (!hTurn || dragging) return;
            if (selSq === null) { if (own) selectSq(sq).then(() => render()); }
            else if (sq === selSq) { selSq = null; dests = []; render(); }
            else if (dests.includes(sq)) { tryMove(selSq, sq); }
            else if (own) { selectSq(sq).then(() => render()); }
            else { selSq = null; dests = []; render(); }
        }
        async function selectSq(sq) {
            selSq = sq; dests = [];
            try { const r = await fetch(API + '/legal', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ fen, square: sq }) }); const d = await r.json(); dests = d.dests || []; } catch { }
        }

        // ═══════════════════════════════════════════════════════
        // Move logic — human modes
        // ═══════════════════════════════════════════════════════
        function tryMove(from, to) {
            selSq = null; dests = [];
            const st = parseFen(fen); const pc = st.board[from];
            const isProm = pc && pc[1] === 'P' && ((pc[0] === 'w' && to[1] === '8') || (pc[0] === 'b' && to[1] === '1'));
            if (isProm) { showPromo(from, to, pc[0]); return; }
            sendMove(from + to);
        }
        async function sendMove(uci) {
            if (inFlight) return; inFlight = true;
            try {
                const r = await fetch(API + '/move', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ fen, move: uci }) });
                const d = await r.json();
                if (d.error) { setStatus('check', '❌ ' + d.error); render(); return; }
                applyMove(d, uci);
                if (!d.game_over) await doOpponentMove();
            } catch { setStatus('check', '⚠ Server offline'); }
            finally { inFlight = false; }
        }
        function applyMove(d, uci) {
            fenStack.push(d.fen); fen = d.fen;
            lastFrom = uci.slice(0, 2); lastTo = uci.slice(2, 4);
            const color = moves.length % 2 === 0 ? 'white' : 'black';
            moves.push({ san: d.san, uci: d.uci || uci, color });
            render(); updateMoves();
            if (d.status === 'check') highlightCheck();
            if (d.game_over) endGame(d.result, true);
        }
        async function doOpponentMove() {
            const temp = parseFloat(document.getElementById('temp').value);
            const lbl = isHvSF() ? `Stockfish d${getDepth()} thinking…` : sessionInfo.opponent + ' thinking…';
            setStatus('opp-turn', lbl);
            try {
                const r = await fetch(API + '/ai', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ fen, temperature: temp }) });
                const d = await r.json();
                if (d.error) { setStatus('your-turn', 'Your turn'); return; }
                applyMove(d, d.uci);
                updateProbs(d.probs || []);
                if (!d.game_over) {
                    if (d.status === 'check') setStatus('check', '⚠ You are in check');
                    else setStatus('your-turn', 'Your turn');
                }
            } catch { }
        }

        // ═══════════════════════════════════════════════════════
        // Autoplay — model-vs-stockfish
        // ═══════════════════════════════════════════════════════
        let autoGameNum = 0;

        async function startAutoplay() {
            const temp = parseFloat(document.getElementById('temp').value);
            const delay = parseFloat(document.getElementById('delay-range').value);
            // Tell server about new delay (it uses _autoplay_delay set at startup;
            // we pass it as a param so the server can use it if desired).
            // Alternate model colour each game.
            autoGameNum++;
            const mColor = (autoGameNum % 2 === 1) ? 'white' : 'black';

            // Update model-side highlight
            document.getElementById('msb-w').classList.toggle('active', mColor === 'white');
            document.getElementById('msb-b').classList.toggle('active', mColor === 'black');

            // Reset board display
            fen = START; moves = []; fenStack = [START]; lastFrom = ''; lastTo = ''; gameOver = false;
            document.getElementById('result-banner').style.display = 'none';
            document.getElementById('movelist').innerHTML = '';
            updateProbs([]); render();

            try {
                await fetch(API + '/autoplay/start', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model_color: mColor, temperature: temp, delay })
                });
            } catch { setStatus('check', '⚠ Server offline'); return; }

            document.getElementById('btn-play').disabled = true;
            document.getElementById('btn-stop').disabled = false;
            setStatus('autoplay', '▶ Auto-playing…');

            pollInterval = setInterval(pollAutoplay, 300);
        }

        async function stopAutoplay() {
            await fetch(API + '/autoplay/stop', { method: 'POST' }).catch(() => { });
            clearInterval(pollInterval); pollInterval = null;
            document.getElementById('btn-play').disabled = false;
            document.getElementById('btn-stop').disabled = true;
            setStatus('game-over', 'Stopped');
        }

        async function pollAutoplay() {
            try {
                const r = await fetch(API + '/autoplay/state');
                const d = await r.json();

                // Sync board
                if (d.fen && d.fen !== fen) {
                    fen = d.fen;
                    if (d.moves && d.moves.length) {
                        const lm = d.moves[d.moves.length - 1];
                        lastFrom = lm.uci.slice(0, 2); lastTo = lm.uci.slice(2, 4);
                    }
                    moves = d.moves || [];
                    render(); updateMoves();
                }

                // Update stats
                if (d.stats) {
                    document.getElementById('st-wins').textContent = d.stats.wins || 0;
                    document.getElementById('st-losses').textContent = d.stats.losses || 0;
                    document.getElementById('st-draws').textContent = d.stats.draws || 0;
                }

                if (!d.running) {
                    clearInterval(pollInterval); pollInterval = null;
                    document.getElementById('btn-play').disabled = false;
                    document.getElementById('btn-stop').disabled = true;
                    if (d.result) {
                        gameOver = true;
                        const mColor = d.model_color;
                        const mIsW = (mColor === 'white');
                        let cls = 'draw', txt = '½–½ Draw';
                        if (d.result === '1-0') { cls = mIsW ? 'win' : 'lose'; txt = mIsW ? 'Model wins ✓' : 'Stockfish wins'; }
                        else if (d.result === '0-1') { cls = mIsW ? 'lose' : 'win'; txt = mIsW ? 'Stockfish wins' : 'Model wins ✓'; }
                        const banner = document.getElementById('result-banner');
                        banner.textContent = txt; banner.className = cls; banner.style.display = 'block';
                        setStatus('game-over', txt);
                        render();
                    }
                }
            } catch { }
        }

        // ═══════════════════════════════════════════════════════
        // Promotion modal
        // ═══════════════════════════════════════════════════════
        function showPromo(from, to, color) {
            const pcs = color === 'w' ? ['wQ', 'wR', 'wB', 'wN'] : ['bQ', 'bR', 'bB', 'bN'];
            const pm = { Q: 'q', R: 'r', B: 'b', N: 'n' };
            const toEl = document.querySelector(`[data-sq="${to}"]`);
            if (toEl) { const br = toEl.getBoundingClientRect(); const wr = document.querySelector('.board-wrap').getBoundingClientRect(); promoEl.style.left = (br.left - wr.left) + 'px'; if (color === 'w') { promoEl.style.top = '0'; promoEl.style.bottom = 'auto'; } else { promoEl.style.bottom = '0'; promoEl.style.top = 'auto'; } }
            promoEl.innerHTML = '';
            pcs.forEach(pc => { const d = document.createElement('div'); d.className = 'promo-sq'; d.style.backgroundImage = makePieceBg(pc); d.onclick = () => { promoEl.classList.remove('show'); sendMove(from + to + pm[pc[1]]); }; promoEl.appendChild(d); });
            promoEl.classList.add('show');
        }

        // ═══════════════════════════════════════════════════════
        // Captured pieces + material
        // ═══════════════════════════════════════════════════════
        const VALS = { p: 1, n: 3, b: 3, r: 5, q: 9, k: 0 };
        const ORDER = ['q', 'r', 'b', 'n', 'p'];
        function updateStrips(st) {
            const start = { p: 8, n: 2, b: 2, r: 2, q: 1 };
            const curr = { w: {}, b: {} };
            for (const [sq, pc] of Object.entries(st.board)) { if (pc[1] === 'K') continue; const c = pc[0], t = pc[1].toLowerCase(); curr[c][t] = (curr[c][t] || 0) + 1; }
            const wCap = [], bCap = [];
            for (const [t, s] of Object.entries(start)) { for (let i = 0; i < s - (curr.b[t] || 0); i++)wCap.push('b' + t.toUpperCase()); for (let i = 0; i < s - (curr.w[t] || 0); i++)bCap.push('w' + t.toUpperCase()); }
            const wMat = Object.entries(curr.w).reduce((s, [t, n]) => s + (VALS[t] || 0) * n, 0);
            const bMat = Object.entries(curr.b).reduce((s, [t, n]) => s + (VALS[t] || 0) * n, 0);
            const adv = wMat - bMat;

            // In model-vs-sf: top=SF, bot=model (or reversed)
            // In human modes: top=opp, bot=human
            const topIsWhite = ((isMvSF() && modelSide === 'black') || (!isMvSF() && humanSide === 'black'));
            const topCap = topIsWhite ? wCap : bCap;
            const botCap = topIsWhite ? bCap : wCap;
            const topAdv = topIsWhite ? adv : -adv;

            renderCap('cap-top', topCap, topAdv);
            renderCap('cap-bot', botCap, -topAdv);

            // Active strip highlight
            const hTurn = !gameOver && st.turn === (humanSide[0]);
            if (!isMvSF()) {
                document.getElementById('strip-bot').classList.toggle('active', hTurn);
                document.getElementById('strip-top').classList.toggle('active', !hTurn);
            } else {
                const modelTurn = (modelSide === 'white' && st.turn === 'w') || (modelSide === 'black' && st.turn === 'b');
                document.getElementById('strip-bot').classList.toggle('model-active', modelTurn);
                document.getElementById('strip-top').classList.toggle('sf-active', !modelTurn);
                document.getElementById('strip-bot').classList.toggle('model-active', !modelTurn);
                document.getElementById('strip-top').classList.toggle('model-active', modelTurn);
            }
        }
        function renderCap(id, pcs, adv) {
            const sorted = pcs.slice().sort((a, b) => ORDER.indexOf(b[1].toLowerCase()) - ORDER.indexOf(a[1].toLowerCase()));
            let html = sorted.map(p => `<span>${GLYPH[p] || ''}</span>`).join('');
            if (adv > 0) html += `<span class="mat-adv">+${adv}</span>`;
            document.getElementById(id).innerHTML = html;
        }

        // ═══════════════════════════════════════════════════════
        // Move list
        // ═══════════════════════════════════════════════════════
        function updateMoves() {
            const el = document.getElementById('movelist');
            let html = '';
            for (let i = 0; i < moves.length; i += 2) {
                const n = Math.floor(i / 2) + 1; const w = moves[i]; const b = moves[i + 1];
                const wc = (i === moves.length - 1) ? 'ms cur' : 'ms'; const bc = (i + 1 === moves.length - 1) ? 'ms cur' : 'ms';
                html += `<div class="move-pair"><span class="mn">${n}.</span><span class="${wc}">${w.san}</span><span class="${bc}">${b?.san || ''}</span></div>`;
            }
            el.innerHTML = html; el.scrollTop = el.scrollHeight;
        }

        // ═══════════════════════════════════════════════════════
        // Move probs
        // ═══════════════════════════════════════════════════════
        function updateProbs(probs) {
            const el = document.getElementById('probs');
            if (!probs || !probs.length) { el.innerHTML = `<span style="font-size:.63rem;color:var(--muted)">No data.</span>`; return; }
            const mx = probs[0].prob;
            el.innerHTML = probs.map((p, i) => `<div class="prob-row"><span class="prob-san">${p.san}</span><div class="prob-bg"><div class="prob-fill ${i === 0 ? 'top' : 'rest'}" style="width:${(p.prob / mx * 100).toFixed(1)}%"></div></div><span class="prob-pct">${(p.prob * 100).toFixed(1)}%</span></div>`).join('');
        }

        // ═══════════════════════════════════════════════════════
        // Status pill
        // ═══════════════════════════════════════════════════════
        function setStatus(cls, text) {
            const el = document.getElementById('status-pill');
            el.className = ''; if (cls) el.classList.add(cls); el.textContent = text;
        }
        function updatePill() {
            if (isMvSF()) return;
            const st = parseFen(fen); const hc = humanSide[0]; const hTurn = !gameOver && st.turn === hc;
            if (gameOver) setStatus('game-over', 'Game over');
            else if (hTurn) setStatus('your-turn', 'Your turn');
            else setStatus('opp-turn', 'Thinking…');
        }
        function highlightCheck() {
            const st = parseFen(fen); const tc = st.turn;
            const kSq = Object.entries(st.board).find(([sq, pc]) => pc[1] === 'K' && pc[0] === tc)?.[0];
            if (kSq) { const el = document.querySelector(`[data-sq="${kSq}"]`); if (el) el.classList.add('in-check'); }
        }
        function endGame(result, humanGame = false) {
            gameOver = true;
            const banner = document.getElementById('result-banner');
            banner.style.display = 'block';
            const hiw = humanSide === 'white';
            if (result === '1/2-1/2') { banner.textContent = '½–½  Draw'; banner.className = 'draw'; setStatus('game-over', 'Draw'); }
            else if ((result === '1-0' && hiw) || (result === '0-1' && !hiw)) { banner.textContent = 'You win! 🎉'; banner.className = 'win'; setStatus('game-over', 'You win!'); }
            else { banner.textContent = isHvSF() ? 'Stockfish wins' : 'Model wins'; banner.className = 'lose'; setStatus('game-over', isHvSF() ? 'Stockfish wins' : 'Model wins'); }
            render();
        }

        // ═══════════════════════════════════════════════════════
        // Controls
        // ═══════════════════════════════════════════════════════
        function setSide(s) {
            if (isMvSF()) return;
            humanSide = s;
            document.getElementById('sb-w').classList.toggle('active', s === 'white');
            document.getElementById('sb-b').classList.toggle('active', s === 'black');
            updateNames();
        }
        function setModelSide(s) {
            modelSide = s;
            document.getElementById('msb-w').classList.toggle('active', s === 'white');
            document.getElementById('msb-b').classList.toggle('active', s === 'black');
        }
        function getDepth() { return parseInt(document.getElementById('depth-num').value) || 5; }
        function syncDepth(v) {
            const n = Math.max(1, Math.min(20, parseInt(v) || 1));
            document.getElementById('depth-range').value = n;
            document.getElementById('depth-num').value = n;
            document.getElementById('depth-badge').textContent = `SF d${n}`;
        }

        function updateNames() {
            const opp = sessionInfo.opponent;
            if (isMvSF()) {
                const mIsW = modelSide === 'white';
                const mLabel = sessionInfo.model_epoch ? `Model (ep ${sessionInfo.model_epoch})` : 'Model';
                const sfLabel = `Stockfish d${sessionInfo.sf_depth}`;
                document.getElementById('nm-top').textContent = mIsW ? sfLabel : mLabel;
                document.getElementById('nm-bot').textContent = mIsW ? mLabel : sfLabel;
                document.getElementById('av-top').textContent = mIsW ? '⚙' : '🧠';
                document.getElementById('av-bot').textContent = mIsW ? '🧠' : '⚙';
            } else {
                const hiw = humanSide === 'white';
                document.getElementById('nm-top').textContent = hiw ? opp : 'You';
                document.getElementById('nm-bot').textContent = hiw ? 'You' : opp;
                document.getElementById('av-top').textContent = hiw ? (isHvSF() ? '⚙' : '🤖') : '🧑';
                document.getElementById('av-bot').textContent = hiw ? '🧑' : (isHvSF() ? '⚙' : '🤖');
            }
        }

        async function newGame() {
            if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
            fen = START; selSq = null; dests = []; lastFrom = ''; lastTo = '';
            gameOver = false; moves = []; fenStack = [START]; dragging = null; inFlight = false;
            document.getElementById('result-banner').style.display = 'none';
            document.getElementById('movelist').innerHTML = '';
            updateProbs([]); render();
            setStatus('your-turn', 'Your turn');
            if (humanSide === 'black' && !isHvSF()) await doOpponentMove();
            else if (humanSide === 'black' && isHvSF()) setStatus('your-turn', 'Your turn'); // human is black, human still moves second
        }
        function undoMove() {
            if (fenStack.length < 3) return;
            fenStack.pop(); fenStack.pop(); fen = fenStack[fenStack.length - 1];
            moves.splice(-2);
            if (moves.length) { const lm = moves[moves.length - 1]; lastFrom = lm.uci.slice(0, 2); lastTo = lm.uci.slice(2, 4); }
            else { lastFrom = ''; lastTo = ''; }
            gameOver = false; selSq = null; dests = [];
            document.getElementById('result-banner').style.display = 'none';
            render(); updateMoves(); setStatus('your-turn', 'Your turn');
        }
        function resign() {
            if (!gameOver) { gameOver = true; const banner = document.getElementById('result-banner'); banner.textContent = 'You resigned'; banner.className = 'lose'; banner.style.display = 'block'; setStatus('game-over', 'Resigned'); render(); }
        }

        // ═══════════════════════════════════════════════════════
        // Init
        // ═══════════════════════════════════════════════════════
        async function init() {
            try {
                const r = await fetch(API + '/status');
                sessionInfo = await r.json();
                applyModeUI();
                updateProbs([]);
                render();
                if (isMvSF()) {
                    setStatus('game-over', 'Press ▶ Play Game');
                } else {
                    setStatus('your-turn', 'Your turn');
                }
            } catch {
                document.getElementById('mode-badge').textContent = '⚠ offline';
                setStatus('check', 'Start arena_server.py');
                render();
            }
        }
        init();
    </script>
</body>

</html>
